# [START cloudrun_rails_cloudbuild]
steps:
  - id: "build image"
    name: "gcr.io/cloud-builders/docker"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        docker build -f Dockerfile.run \
          --build-arg SECRET_KEY_BASE=$$RAILS_KEY \
          -t gcr.io/${PROJECT_ID}/${_SERVICE_NAME} \
          --cache-from gcr.io/${PROJECT_ID}/${_SERVICE_NAME}:latest \
          .
    secretEnv: ["RAILS_KEY"]

  - id: "push image"
    name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/${PROJECT_ID}/${_SERVICE_NAME}"]

  - id: "deploy"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "bash"
    args:
      - -c
      - |
        gcloud run deploy ${_SERVICE_NAME} \
          --image gcr.io/${PROJECT_ID}/${_SERVICE_NAME} \
          --update-secrets=SECRET_KEY_BASE=${_SECRET_NAME}:latest,RAILS_MASTER_KEY=${_SECRET_NAME}:latest,DB_HOST=CHAT_DB_HOST:latest,DB_PORT=CHAT_DB_PORT:latest,DB_NAME=CHAT_DB_NAME:latest,DB_USER=CHAT_DB_USER:latest,DB_PASS=CHAT_DB_PASS:latest,GOOGLE_CLOUD_BUCKET_NAME=CHAT_BUCKET_NAME:latest,GOOGLE_CLOUD_STORAGE_ISSUER=GOOGLE_CLOUD_STORAGE_ISSUER:latest,GOOGLE_CLOUD_STORAGE_PRIVATE_KEY=GOOGLE_CLOUD_STORAGE_PRIVATE_KEY:latest \
          --update-env-vars=RAILS_SERVE_STATIC_FILES=true,GOOGLE_PROJECT_ID=${PROJECT_ID} \
          --region asia-northeast1 \
          --allow-unauthenticated \
          --memory 512Mi \
          --cpu 1 \
          --max-instances 1 \
          --min-instances 0 \
          --concurrency 80 \
          --timeout 300s

substitutions:
  # Secret Manager resource names (Cloud Run injects them as env vars via --update-secrets).
  _SERVICE_NAME: rails-cloud-run-chat
  _SECRET_NAME: RAILS_KEY

availableSecrets:
  secretManager:
    - versionName: projects/${PROJECT_ID}/secrets/${_SECRET_NAME}/versions/latest
      env: RAILS_KEY

images:
  - "gcr.io/${PROJECT_ID}/${_SERVICE_NAME}"

options:
  logging: CLOUD_LOGGING_ONLY
# [END cloudrun_rails_cloudbuild]
